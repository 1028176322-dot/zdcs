<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<title>AutoSmoke 页面关系图</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background:#1a1a2e; color:#fff; }
#header { padding:16px 20px; background:#16213e; }
#header h1 { font-size:18px; }
#header .stats { font-size:13px; color:#888; margin-top:4px; }
#mynetwork { width:100%; height:calc(100vh - 60px); }
</style>
</head>
<body>
<div id="header">
<h1>🔗 AutoSmoke 页面关系图</h1>
<div class="stats" id="stats">加载中...</div>
</div>
<div id="mynetwork"></div>
<script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
<script>
var nodes = new vis.DataSet([{"id": "MainCity", "label": "MainCity", "value": 1}, {"id": "BagPanel", "label": "BagPanel", "value": 2}, {"id": "RewardPopup", "label": "RewardPopup", "value": 1}]);  
var edges = new vis.DataSet([{"from": "MainCity", "to": "BagPanel", "label": "BagButton", "title": "click → BagButton"}, {"from": "BagPanel", "to": "RewardPopup", "label": "UseButton", "title": "click → UseButton"}]);  
var container = document.getElementById('mynetwork');
var data = { nodes: nodes, edges: edges };
var options = {
    nodes: { shape: 'dot', size: 20, font: { color: '#fff', size: 14 } },
    edges: { arrows: 'to', font: { size: 11, color: '#aaa' } },
    physics: { solver: 'forceAtlas2Based' },
    interaction: { hover: true, tooltipDelay: 200 }
};
var network = new vis.Network(container, data, options);
document.getElementById('stats').textContent = 
    '页面: ' + nodes.length + ' | 导航: ' + edges.length + ' 条';
</script>
</body>
</html>
